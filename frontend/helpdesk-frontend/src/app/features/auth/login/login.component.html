<div class="min-h-screen flex align-items-center justify-content-center p-4 shadow-inner"
    style="background: linear-gradient(135deg, #0f172a 0%, #1e40af 100%);">

    <div class="surface-card p-6 shadow-8 border-round-xl w-full"
        style="max-width: 450px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(20px);">
        <div class="text-center mb-6">
            <div class="text-4xl font-bold text-900 mb-2 tracking-tight">HelpDesk</div>
            <div class="text-700 font-medium line-height-3">Witaj z powrotem! Zaloguj się do swojego konta.</div>
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-4">

            <div class="flex flex-column gap-2">
                <label for="email" class="font-bold text-800 text-sm">Adres E-mail</label>
                <span class="p-input-icon-left">
                    <i class="pi pi-envelope text-600"></i>
                    <input id="email" type="email" pInputText formControlName="email"
                        class="w-full p-inputtext-lg border-2 hover:border-primary-500 transition-colors"
                        placeholder="Twoja nazwa użytkownika" />
                </span>
                <small *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="p-error">
                    Podaj poprawny adres email
                </small>
            </div>

            <div class="flex flex-column gap-2">
                <label for="password" class="font-semibold text-900">Hasło</label>
                <p-password id="password" formControlName="password" [feedback]="false" [toggleMask]="true"
                    appendTo="body" styleClass="w-full" inputStyleClass="w-full p-inputtext-lg"></p-password>
                <small *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="p-error">
                    Hasło jest wymagane
                </small>
            </div>

            <p-button label="Zaloguj się" icon="pi pi-sign-in" type="submit" [loading]="loading"
                styleClass="w-full p-button-lg shadow-2"></p-button>

        </form>

        <div class="mt-6 p-3 border-round-lg bg-blue-50 border-1 border-blue-100">
            <div class="text-blue-700 font-semibold mb-2 flex align-items-center gap-2">
                <i class="pi pi-info-circle"></i> Dane testowe
            </div>
            <div class="grid text-xs text-blue-600 mt-2">
                <div class="col-6"><strong>Admin:</strong> admin@example.com</div>
                <div class="col-6"><strong>Hasło:</strong> admin</div>
                <div class="col-6"><strong>Support:</strong> support@example.com</div>
                <div class="col-6"><strong>Hasło:</strong> support</div>
                <div class="col-6"><strong>User:</strong> user@example.com</div>
                <div class="col-6"><strong>Hasło:</strong> user</div>
            </div>
        </div>
    </div>
</div>
