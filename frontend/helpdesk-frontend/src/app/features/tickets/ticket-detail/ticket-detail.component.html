<div class="grid" *ngIf="ticket">
    <div class="col-12 md:col-8">
        <p-card styleClass="mb-4">
            <div class="flex justify-content-between align-items-center mb-3">
                <h1 class="m-0 text-900 font-bold text-3xl">{{ ticket.title }}</h1>
                <div class="flex gap-2 align-items-center" *ngIf="user$ | async as currentUser">
                    <p-tag [value]="ticket.status" [severity]="getSeverity(ticket.status)"
                        styleClass="p-2 text-sm"></p-tag>

                    <!-- Support Actions: Toggle Status -->
                    <ng-container *ngIf="currentUser.role === 'support'">
                        <p-button *ngIf="ticket.status === 'OPEN'" icon="pi pi-play" [rounded]="true" [text]="true"
                            label="Zacznij" severity="info" (click)="updateStatus('IN_PROGRESS')"></p-button>
                        <p-button *ngIf="ticket.status !== 'CLOSED'" icon="pi pi-lock" [rounded]="true" [text]="true"
                            label="Zamknij" severity="warn" (click)="updateStatus('CLOSED')"></p-button>
                        <p-button *ngIf="ticket.status === 'CLOSED'" icon="pi pi-lock-open" [rounded]="true"
                            [text]="true" label="Otwórz" severity="info" (click)="updateStatus('OPEN')"></p-button>
                    </ng-container>

                    <!-- Admin Actions: Edit & Delete -->
                    <ng-container *ngIf="currentUser.role === 'admin'">
                        <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" label="Edytuj"
                            [routerLink]="['/tickets', ticket.id, 'edit']"></p-button>
                        <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" label="Usuń"
                            (click)="deleteTicket()"></p-button>
                    </ng-container>
                </div>
            </div>
            <div class="flex gap-2 mb-3">
                <p-tag [value]="ticket.priority" [severity]="getPrioritySeverity(ticket.priority)"></p-tag>
                <p-tag [value]="getCategoryName(ticket.categoryId)" severity="secondary"></p-tag>
            </div>
            <div class="surface-card p-4 border-round shadow-1 border-1 border-200">
                <div class="text-xs font-bold text-500 uppercase mb-2">Opis zgłoszenia</div>
                <div class="text-900 line-height-3 text-lg">{{ ticket.description }}</div>
            </div>
            <div class="text-600 mt-3 text-sm flex gap-4">
                <span><i class="pi pi-user mr-1 text-400"></i> Zgłoszone przez: <span class="text-900 font-bold">{{
                        getUserName(ticket.userId) }}</span></span>
                <span><i class="pi pi-calendar mr-1 text-400"></i> Data: <span class="text-900 font-bold">{{ ticket.date
                        | date:'medium' }}</span></span>
            </div>
        </p-card>

        <p-card header="Komentarze">
            <div class="flex flex-column gap-4">
                <div *ngFor="let comment of (comments$ | async)" class="surface-ground p-3 border-round">
                    <div class="flex justify-content-between mb-2">
                        <span class="font-bold">
                            <i class="pi pi-user mr-1 text-400"></i>
                            {{ getUserName(comment.userId) }}
                        </span>
                        <span class="text-500 text-sm">{{ comment.date | date:'short' }}</span>
                    </div>
                    <div class="text-900">{{ comment.content }}</div>
                </div>
            </div>
        </p-card>
        <p-card header="Dodaj komentarz" class="mt-4">
            <div *ngIf="!(canAct$ | async)" class="mb-3">
                <p-message severity="error"
                    text="Twoje konto jest zawieszone. Nie możesz dodawać komentarzy."></p-message>
            </div>
            <div *ngIf="ticket.status === 'CLOSED'" class="mb-3">
                <p-message severity="info"
                    text="To zgłoszenie jest zamknięte. Dodawanie komentarzy jest zablokowane."></p-message>
            </div>
            <div class="flex flex-column gap-3">
                <textarea pTextarea [(ngModel)]="newCommentContent" rows="3" class="w-full"
                    placeholder="Wpisz treść komentarza..."
                    [disabled]="!(canAct$ | async) || ticket.status === 'CLOSED'"></textarea>
                <div class="flex justify-content-end">
                    <p-button label="Wyślij" icon="pi pi-send" (click)="addComment()"
                        [disabled]="!newCommentContent.trim() || !(canAct$ | async) || ticket.status === 'CLOSED'"></p-button>
                </div>
            </div>
        </p-card>
    </div>

    <div class="col-12 md:col-4">
        <!-- Sidebar info if needed -->
    </div>
</div>
