<div class="card">
    <div class="flex justify-content-between align-items-center mb-4">
        <h2 class="m-0">Zgłoszenia</h2>
        <!-- Future: Add Create Ticket Button -->
    </div>

    <p-table [value]="(tickets$ | async) || []" [tableStyle]="{ 'min-width': '50rem' }">
        <ng-template pTemplate="header">
            <tr>
                <th style="width:5%">ID</th>
                <th style="width:30%">Tytuł</th>
                <th style="width:20%">Kategoria</th>
                <th style="width:10%">Priorytet</th>
                <th style="width:15%">Status</th>
                <th style="width:10%">Data</th>
                <th style="width:10%"></th>
            </tr>
        </ng-template>
        <ng-template pTemplate="body" let-ticket>
            <tr>
                <td>{{ ticket.id }}</td>
                <td class="font-bold">{{ ticket.title }}</td>
                <td>{{ getCategoryName(ticket.categoryId) }}</td>
                <td>
                    <p-tag [value]="ticket.priority" [severity]="getPrioritySeverity(ticket.priority)"></p-tag>
                </td>
                <td>
                    <p-tag [value]="ticket.status" [severity]="getSeverity(ticket.status)"></p-tag>
                </td>
                <td>{{ ticket.date | date:'shortDate' }}</td>
                <td>
                    <!-- Future: RouterLink to Details -->
                    <p-button icon="pi pi-search" [rounded]="true" [text]="true"
                        [routerLink]="['/tickets', ticket.id]"></p-button>
                </td>
            </tr>
        </ng-template>
        <ng-template pTemplate="emptymessage">
            <tr>
                <td colspan="7">Brak zgłoszeń.</td>
            </tr>
        </ng-template>
    </p-table>
</div>
