<nav
    class="navbar surface-card border-bottom-1 surface-border px-4 py-3 flex justify-content-between align-items-center">
    <div class="flex align-items-center gap-4">
        <a routerLink="/" class="text-xl font-bold text-900 no-underline">HelpDesk</a>

        <div class="flex gap-3">
            <a routerLink="/tickets" routerLinkActive="text-primary font-semibold"
                class="text-700 hover:text-900 no-underline transition-colors p-ripple">Zgłoszenia</a>
        </div>
    </div>

    <div class="flex gap-2">
        @if (user$ | async; as user) {
        <div class="flex align-items-center gap-3 mr-2">
            <span class="text-700 text-sm">
                Witaj, <a routerLink="/profile" class="font-bold text-900 no-underline hover:underline">{{
                    user.firstName }} {{ user.lastName }}</a>
                <span class="ml-1 px-2 py-1 surface-200 border-round text-xs font-semibold uppercase">{{ user.role
                    }}</span>
            </span>
            <p-button label="Wyloguj" icon="pi pi-sign-out" [text]="true" (click)="logout()"></p-button>
        </div>
        } @else {
        <a routerLink="/auth/login" class="p-button p-component p-button-text no-underline">Zaloguj</a>
        }
    </div>
</nav>
